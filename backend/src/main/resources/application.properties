spring.application.name=a2s-backend
server.port=8080

# Database Configuration (Azure SQL Server / H2)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console
spring.h2.console.enabled=true

# Security
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5U2hvdWxkQmVMb25nRW5vdWdoRm9yU2VjdXJpdHlQdXJwb3Nlc1NhbXBsZXMxMjM0NTY3ODkw}
jwt.expiration=86400000

# Cors
cors.allowed-origins=http://localhost:3000

# Logging
logging.level.org.springframework.security=DEBUG
